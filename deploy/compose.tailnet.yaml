services:
  tailscale:
    image: tailscale/tailscale:v1.98.9
    hostname: ${RIDE_RELAY_TAILSCALE_HOSTNAME:-ride-relay}
    restart: unless-stopped
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_AUTH_ONCE: "true"
      TS_HOSTNAME: ${RIDE_RELAY_TAILSCALE_HOSTNAME:-ride-relay}
      TS_SERVE_CONFIG: /config/serve.json
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "true"
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale:/config:ro
    depends_on:
      server:
        condition: service_healthy

volumes:
  tailscale-state:
