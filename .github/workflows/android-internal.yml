name: Android Internal Testing

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional unique Android version code (defaults to GitHub run number)
        required: false
        type: string
      release_name:
        description: Optional name shown in Google Play Console
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: android-internal-upload
  cancel-in-progress: false

env:
  FLUTTER_VERSION: 3.44.6
  MOBILE_DIR: apps/mobile

jobs:
  upload:
    name: Build and upload Android beta
    runs-on: ubuntu-latest
    environment: android-internal
    timeout-minutes: 35
    defaults:
      run:
        working-directory: ${{ env.MOBILE_DIR }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install Android upload key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          test -n "$KEY_ALIAS"
          test -n "$KEY_PASSWORD"
          test -n "$STORE_PASSWORD"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'storeFile=upload-keystore.jks\n'
          } > android/key.properties
      - name: Build signed app bundle
        env:
          BUILD_NUMBER: ${{ inputs.build_number || github.run_number }}
          RIDE_RELAY_API_BASE_URL: https://ride-relay.tail7b2c49.ts.net/api
        run: |
          set -euo pipefail
          flutter pub get
          flutter build appbundle --release \
            --build-number="$BUILD_NUMBER" \
            --dart-define=RIDE_RELAY_API_BASE_URL="$RIDE_RELAY_API_BASE_URL"
      - name: Upload to Google Play internal testing
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: me.osholt.ride_relay
          releaseFiles: apps/mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: ${{ inputs.release_name || format('Tail End Charlie beta {0}', github.run_number) }}
      - if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tail-end-charlie-android-internal-aab
          path: ${{ env.MOBILE_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
